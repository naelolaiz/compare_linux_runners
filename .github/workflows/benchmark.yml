name: ARM vs Intel Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch_label: x86_64
          - runner: ubuntu-24.04-arm
            arch_label: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy

      - name: Run benchmarks
        run: python benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.arch_label }}
          path: benchmark_results_*.json

  summary:
    name: Comparison Summary
    needs: benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Download x86_64 results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-x86_64
          path: results/x86_64

      - name: Download aarch64 results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-aarch64
          path: results/aarch64

      - name: Generate comparison table
        run: |
          python3 - <<'EOF'
          import json
          import os
          import glob

          def load_results(directory):
              files = glob.glob(os.path.join(directory, "*.json"))
              if not files:
                  return {}
              with open(files[0]) as f:
                  data = json.load(f)
              return {item["benchmark"]: item["elapsed_seconds"] for item in data}

          x86 = load_results("results/x86_64")
          arm = load_results("results/aarch64")

          all_benchmarks = sorted(set(list(x86.keys()) + list(arm.keys())))

          lines = []
          lines.append("## 🏁 ARM vs Intel Benchmark Results\n")
          lines.append("| Benchmark | x86_64 (s) | aarch64 (s) | Faster |")
          lines.append("|-----------|------------|-------------|--------|")

          for bm in all_benchmarks:
              x_time = x86.get(bm)
              a_time = arm.get(bm)

              x_str = f"{x_time:.4f}" if x_time is not None else "N/A"
              a_str = f"{a_time:.4f}" if a_time is not None else "N/A"

              if x_time is not None and a_time is not None:
                  if x_time < a_time:
                      faster = "🔵 x86_64"
                      pct = (a_time - x_time) / a_time * 100
                      faster += f" ({pct:.1f}% faster)"
                  elif a_time < x_time:
                      faster = "🟠 aarch64"
                      pct = (x_time - a_time) / x_time * 100
                      faster += f" ({pct:.1f}% faster)"
                  else:
                      faster = "🟰 Tie"
              else:
                  faster = "N/A"

              lines.append(f"| {bm} | {x_str} | {a_str} | {faster} |")

          lines.append("")
          lines.append("> Timing measured with `time.perf_counter()`. Lower is better.")

          summary = "\n".join(lines)
          print(summary)

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_file, "a") as f:
              f.write(summary + "\n")
          EOF
